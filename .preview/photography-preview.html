<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>摄影站响应式预览</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", sans-serif; background: #f3f0ea; color: #1c1b18; }
    body { margin: 0; padding: 24px; }
    header { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    h1 { margin: 0; font-size: 28px; }
    p { margin: 6px 0 0; color: rgba(28,27,24,.68); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
    .viewport { border: 1px solid rgba(28,27,24,.18); background: #faf8f3; padding: 14px; }
    .viewport h2 { margin: 0 0 14px; font-size: 16px; letter-spacing: .04em; }
    .shot { margin: 0 0 18px; }
    .shot h3 { margin: 0 0 8px; font-size: 13px; font-weight: 600; color: rgba(28,27,24,.72); }
    img { display: block; width: 100%; height: auto; border: 1px solid rgba(28,27,24,.14); background: white; }
    code { background: rgba(28,27,24,.08); padding: 2px 5px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>摄影站响应式预览</h1>
      <p>截图来自 <code>http://127.0.0.1:5710/</code>，包含首页、引导页、展示页、详情弹层。</p>
    </div>
  </header>
  <main class="grid"><article class="viewport"><h2>320 x 720</h2><section class="shot"><h3>首页</h3><img src="screenshots/home-320.png" alt="首页 320" /></section>
<section class="shot"><h3>引导页</h3><img src="screenshots/guide-320.png" alt="引导页 320" /></section>
<section class="shot"><h3>展示页</h3><img src="screenshots/showcase-320.png" alt="展示页 320" /></section>
<section class="shot"><h3>详情弹层</h3><img src="screenshots/detail-320.png" alt="详情弹层 320" /></section></article>
<article class="viewport"><h2>390 x 844</h2><section class="shot"><h3>首页</h3><img src="screenshots/home-390.png" alt="首页 390" /></section>
<section class="shot"><h3>引导页</h3><img src="screenshots/guide-390.png" alt="引导页 390" /></section>
<section class="shot"><h3>展示页</h3><img src="screenshots/showcase-390.png" alt="展示页 390" /></section>
<section class="shot"><h3>详情弹层</h3><img src="screenshots/detail-390.png" alt="详情弹层 390" /></section></article>
<article class="viewport"><h2>430 x 932</h2><section class="shot"><h3>首页</h3><img src="screenshots/home-430.png" alt="首页 430" /></section>
<section class="shot"><h3>引导页</h3><img src="screenshots/guide-430.png" alt="引导页 430" /></section>
<section class="shot"><h3>展示页</h3><img src="screenshots/showcase-430.png" alt="展示页 430" /></section>
<section class="shot"><h3>详情弹层</h3><img src="screenshots/detail-430.png" alt="详情弹层 430" /></section></article>
<article class="viewport"><h2>1440 x 900</h2><section class="shot"><h3>首页</h3><img src="screenshots/home-1440.png" alt="首页 1440" /></section>
<section class="shot"><h3>引导页</h3><img src="screenshots/guide-1440.png" alt="引导页 1440" /></section>
<section class="shot"><h3>展示页</h3><img src="screenshots/showcase-1440.png" alt="展示页 1440" /></section>
<section class="shot"><h3>详情弹层</h3><img src="screenshots/detail-1440.png" alt="详情弹层 1440" /></section></article></main>
</body>
</html>
