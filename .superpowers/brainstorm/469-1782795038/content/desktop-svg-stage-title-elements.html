<div class="section">
  <h3>设计元素发散</h3>
  <p>底部不再只是色块：混合拍立得、胶片齿孔、接触印样、取景框裁切角。它们用莫兰迪灰绿/砂灰做填充，黑白为主，避免抢照片主体。</p>
  <p>标题顶部对齐改用 SVG 坐标：参考线是固定 y 值，文字用 `dominant-baseline="text-before-edge"` 贴近线下沿，再微调 y 值。</p>
