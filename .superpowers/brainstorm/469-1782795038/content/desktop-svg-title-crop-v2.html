<div class="section">
  <h3>修正点</h3>
  <p>文字不是直接放在线下，而是先向上顶进裁切窗口；窗口从横线 y 值开始，所以顶部会被细线位置轻切。</p>
  <p>标题整体重新校位：上两行略向左收，底部两行略上移，避免整体偏右偏下。</p>
